image: python:3.11

definitions:
  steps:
    - step: &precommit-test
        name: Pre-Commit Test
        caches:
          - pip
        script:
          - pip install pre-commit
          - pre-commit run --all-files --verbose
    - step: &qa-test
        name: QA Test
        caches:
          - pip
        script:
          - pip install -r requirements.txt
          - pip install -r requirements-test.txt
          - ruff format --check .
          - ruff check .
          - pylint --extension-pkg-whitelist=netifaces bin/pydaikin pydaikin/*.py

pipelines:
  default:
    - step: *precommit-test
    - step: *qa-test
  pull-requests:
    '**':
      - step: *precommit-test
      - step: *qa-test
